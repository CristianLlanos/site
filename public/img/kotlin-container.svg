      <stop offset="50%" style="stop-color:#2B5EA7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1BA4E0;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#000" flood-opacity="0.3"/>
