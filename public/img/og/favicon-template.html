<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=512">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@800&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 512px; height: 512px; overflow: hidden;
    background: transparent;
    display: flex; align-items: center; justify-content: center;
  }
  .icon {
    width: 512px; height: 512px;
    background: #08080f;
    border-radius: 96px;
    position: relative;
    overflow: hidden;
    display: flex; align-items: center; justify-content: center;
  }
  .noise {
    position: absolute; inset: 0; opacity: 0.04;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    background-size: 128px;
    border-radius: 96px;
  }
  .grid-bg {
    position: absolute; inset: 0;
    background-image:
      linear-gradient(rgba(124,58,237,0.06) 1px, transparent 1px),
      linear-gradient(90deg, rgba(124,58,237,0.06) 1px, transparent 1px);
    background-size: 32px 32px;
    border-radius: 96px;
  }
  .glow {
    position: absolute; border-radius: 50%; filter: blur(60px);
  }
  .glow-1 { width: 300px; height: 300px; top: -80px; right: -60px; background: #7c3aed; opacity: 0.3; }
  .glow-2 { width: 250px; height: 250px; bottom: -60px; left: -40px; background: #0891b2; opacity: 0.2; }

  /* Node accent */
  .node {
    position: absolute;
    top: 72px; right: 88px;
    width: 14px; height: 14px;
    border-radius: 50%;
    background: #7c3aed;
    opacity: 0.5;
  }
  .node::after {
    content: '';
    position: absolute;
    top: -6px; left: -6px;
    width: 26px; height: 26px;
    border-radius: 50%;
    border: 1.5px solid #7c3aed;
    opacity: 0.3;
  }
  .node-2 {
    position: absolute;
    bottom: 100px; left: 80px;
    width: 10px; height: 10px;
    border-radius: 50%;
    background: #0891b2;
    opacity: 0.35;
  }

  .monogram {
    position: relative; z-index: 10;
    font-family: 'JetBrains Mono', monospace;
    font-size: 220px;
    font-weight: 800;
    letter-spacing: -0.06em;
    line-height: 1;
    background: linear-gradient(135deg, #f0f0f8 0%, #c4b5fd 50%, #67e8f9 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .border-line {
    position: absolute; bottom: 0; left: 40px; right: 40px; height: 4px;
    background: linear-gradient(90deg, #7c3aed, #0891b2);
    opacity: 0.5;
    border-radius: 0 0 4px 4px;
  }
</style>
</head>
<body>
  <div class="icon">
    <div class="noise"></div>
    <div class="grid-bg"></div>
    <div class="glow glow-1"></div>
    <div class="glow glow-2"></div>
    <div class="node"></div>
    <div class="node-2"></div>
    <span class="monogram">CL</span>
    <div class="border-line"></div>
  </div>
</body>
</html>
