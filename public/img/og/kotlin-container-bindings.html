<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1200">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1200px; height: 630px; overflow: hidden;
    background: #08080f;
    font-family: 'DM Sans', sans-serif;
    position: relative;
  }
  .noise {
    position: absolute; inset: 0; opacity: 0.035;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    background-size: 200px;
  }
  .grid-bg {
    position: absolute; inset: 0;
    background-image:
      linear-gradient(rgba(124,58,237,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(124,58,237,0.04) 1px, transparent 1px);
    background-size: 60px 60px;
  }
  .glow { position: absolute; border-radius: 50%; filter: blur(120px); }
  .glow-1 { width: 400px; height: 400px; top: -80px; right: 100px; background: #7c3aed; opacity: 0.22; }
  .glow-2 { width: 350px; height: 350px; bottom: -60px; left: 200px; background: #f59e0b; opacity: 0.1; }

  .motif {
    position: absolute; top: 0; left: 0; width: 1200px; height: 630px; opacity: 0.5;
  }

  .content {
    position: relative; z-index: 10;
    display: flex; flex-direction: column; justify-content: center;
    height: 100%; padding: 72px 80px;
  }
  .series-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px; font-weight: 700;
    color: rgba(167,139,250,0.6);
    letter-spacing: 0.1em; text-transform: uppercase;
    margin-bottom: 16px;
  }
  .step {
    display: inline-flex; align-items: center; gap: 12px;
    margin-bottom: 28px;
  }
  .step-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 18px; font-weight: 800;
    color: #08080f;
    background: linear-gradient(135deg, #a78bfa, #fbbf24);
    width: 40px; height: 40px; border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
  }
  .step-text {
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px; color: rgba(226,226,240,0.4);
    letter-spacing: 0.05em;
  }
  h1 {
    font-family: 'JetBrains Mono', monospace;
    font-size: 64px; font-weight: 800;
    line-height: 1.08; letter-spacing: -0.03em;
    background: linear-gradient(135deg, #f0f0f8 0%, #c4b5fd 50%, #fbbf24 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 20px;
  }
  .tagline {
    font-size: 22px; font-weight: 500;
    color: rgba(226,226,240,0.55);
    line-height: 1.5; max-width: 580px;
  }
  .bottom {
    position: absolute; bottom: 40px; left: 80px; right: 80px;
    display: flex; align-items: center; justify-content: space-between; z-index: 10;
  }
  .domain {
    font-family: 'JetBrains Mono', monospace;
    font-size: 15px; color: rgba(226,226,240,0.35);
  }
  .lib-name {
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px; color: rgba(167,139,250,0.45);
    border: 1px solid rgba(167,139,250,0.15);
    border-radius: 100px; padding: 5px 16px;
  }
  .border-line {
    position: absolute; bottom: 0; left: 0; right: 0; height: 4px;
    background: linear-gradient(90deg, #7c3aed, #f59e0b);
    opacity: 0.5;
  }
</style>
</head>
<body>
  <div class="noise"></div>
  <div class="grid-bg"></div>
  <div class="glow glow-1"></div>
  <div class="glow glow-2"></div>

  <!-- Three binding types: factory (many), singleton (one), scoped (grouped) -->
  <svg class="motif" viewBox="0 0 1200 630" fill="none">
    <!-- Factory: multiple small nodes radiating -->
    <circle cx="900" cy="140" r="5" fill="#fbbf24" opacity="0.5"/>
    <circle cx="930" cy="110" r="4" fill="#fbbf24" opacity="0.4"/>
    <circle cx="960" cy="130" r="5" fill="#fbbf24" opacity="0.5"/>
    <circle cx="940" cy="160" r="4" fill="#fbbf24" opacity="0.35"/>
    <circle cx="970" cy="150" r="3" fill="#fbbf24" opacity="0.3"/>
    <text x="910" y="190" font-family="JetBrains Mono" font-size="11" fill="#fbbf24" opacity="0.35">factory</text>

    <!-- Singleton: one solid node with ring -->
    <circle cx="1050" cy="300" r="14" fill="#a78bfa" opacity="0.6"/>
    <circle cx="1050" cy="300" r="26" stroke="#a78bfa" stroke-width="1.5" fill="none" opacity="0.25"/>
    <circle cx="1050" cy="300" r="38" stroke="#a78bfa" stroke-width="1" fill="none" opacity="0.12"/>
    <text x="1020" y="355" font-family="JetBrains Mono" font-size="11" fill="#a78bfa" opacity="0.35">singleton</text>

    <!-- Scoped: cluster inside a boundary -->
    <rect x="870" y="400" width="120" height="80" rx="8" stroke="#0891b2" stroke-width="1.5" fill="none" opacity="0.25" stroke-dasharray="4 4"/>
    <circle cx="905" cy="430" r="5" fill="#0891b2" opacity="0.5"/>
    <circle cx="935" cy="445" r="6" fill="#0891b2" opacity="0.55"/>
    <circle cx="960" cy="425" r="4" fill="#0891b2" opacity="0.4"/>
    <text x="895" y="505" font-family="JetBrains Mono" font-size="11" fill="#0891b2" opacity="0.35">scoped</text>

    <!-- Connecting lines from center concept -->
    <line x1="930" y1="250" x2="935" y2="170" stroke="#fbbf24" stroke-width="1" opacity="0.2"/>
    <line x1="980" y1="290" x2="1024" y2="298" stroke="#a78bfa" stroke-width="1" opacity="0.2"/>
    <line x1="930" y1="350" x2="930" y2="400" stroke="#0891b2" stroke-width="1" opacity="0.2"/>
    <circle cx="940" cy="300" r="3" fill="#e2e2f0" opacity="0.2"/>
  </svg>

  <div class="content">
    <div class="series-label">kotlin-container docs</div>
    <div class="step">
      <div class="step-num">02</div>
      <span class="step-text">Guide</span>
    </div>
    <h1>Bindings</h1>
    <p class="tagline">Factory, singleton, and scoped — control how instances are created and shared.</p>
  </div>

  <div class="bottom">
    <span class="domain">cristianllanos.com</span>
    <span class="lib-name">kotlin-container</span>
  </div>
  <div class="border-line"></div>
</body>
</html>
