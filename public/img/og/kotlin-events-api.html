<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1200">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1200px; height: 630px; overflow: hidden;
    background: #08080f;
    font-family: 'DM Sans', sans-serif;
    position: relative;
  }
  .noise {
    position: absolute; inset: 0; opacity: 0.035;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    background-size: 200px;
  }
  .grid-bg {
    position: absolute; inset: 0;
    background-image:
      linear-gradient(rgba(6,182,212,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(6,182,212,0.04) 1px, transparent 1px);
    background-size: 60px 60px;
  }
  .glow { position: absolute; border-radius: 50%; filter: blur(120px); }
  .glow-1 { width: 450px; height: 450px; top: -100px; right: 50px; background: #7c3aed; opacity: 0.25; }
  .glow-2 { width: 350px; height: 350px; bottom: -80px; left: 100px; background: #06b6d4; opacity: 0.15; }

  /* Grid/table motif */
  .motif {
    position: absolute; top: 0; left: 0; width: 1200px; height: 630px; opacity: 0.45;
  }

  .content {
    position: relative; z-index: 10;
    display: flex; flex-direction: column; justify-content: center;
    height: 100%; padding: 72px 80px;
  }
  .series-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px; font-weight: 700;
    color: rgba(167,139,250,0.6);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 28px;
  }
  h1 {
    font-family: 'JetBrains Mono', monospace;
    font-size: 64px; font-weight: 800;
    line-height: 1.08;
    letter-spacing: -0.03em;
    background: linear-gradient(135deg, #f0f0f8 0%, #c4b5fd 60%, #06b6d4 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 20px;
  }
  .tagline {
    font-size: 22px; font-weight: 500;
    color: rgba(226,226,240,0.55);
    line-height: 1.5;
    max-width: 580px;
  }
  .bottom {
    position: absolute; bottom: 40px; left: 80px; right: 80px;
    display: flex; align-items: center; justify-content: space-between;
    z-index: 10;
  }
  .domain {
    font-family: 'JetBrains Mono', monospace;
    font-size: 15px; color: rgba(226,226,240,0.35);
  }
  .lib-name {
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px; color: rgba(167,139,250,0.45);
    border: 1px solid rgba(167,139,250,0.15);
    border-radius: 100px; padding: 5px 16px;
  }
  .border-line {
    position: absolute; bottom: 0; left: 0; right: 0; height: 4px;
    background: linear-gradient(90deg, #7c3aed, #06b6d4);
    opacity: 0.5;
  }
</style>
</head>
<body>
  <div class="noise"></div>
  <div class="grid-bg"></div>
  <div class="glow glow-1"></div>
  <div class="glow glow-2"></div>

  <svg class="motif" viewBox="0 0 1200 630" fill="none">
    <!-- Grid/table lines — structured reference -->
    <!-- Horizontal lines -->
    <line x1="850" y1="140" x2="1150" y2="140" stroke="#06b6d4" stroke-width="1" opacity="0.3"/>
    <line x1="850" y1="200" x2="1150" y2="200" stroke="#a78bfa" stroke-width="1" opacity="0.2"/>
    <line x1="850" y1="260" x2="1150" y2="260" stroke="#06b6d4" stroke-width="1" opacity="0.3"/>
    <line x1="850" y1="320" x2="1150" y2="320" stroke="#a78bfa" stroke-width="1" opacity="0.2"/>
    <line x1="850" y1="380" x2="1150" y2="380" stroke="#06b6d4" stroke-width="1" opacity="0.3"/>
    <line x1="850" y1="440" x2="1150" y2="440" stroke="#a78bfa" stroke-width="1" opacity="0.2"/>
    <line x1="850" y1="500" x2="1150" y2="500" stroke="#06b6d4" stroke-width="1" opacity="0.3"/>
    <!-- Vertical lines -->
    <line x1="850" y1="140" x2="850" y2="500" stroke="#06b6d4" stroke-width="1" opacity="0.3"/>
    <line x1="950" y1="140" x2="950" y2="500" stroke="#7c3aed" stroke-width="1" opacity="0.15"/>
    <line x1="1050" y1="140" x2="1050" y2="500" stroke="#7c3aed" stroke-width="1" opacity="0.15"/>
    <line x1="1150" y1="140" x2="1150" y2="500" stroke="#06b6d4" stroke-width="1" opacity="0.3"/>
    <!-- Header row highlight -->
    <rect x="850" y="140" width="300" height="60" fill="#06b6d4" opacity="0.04"/>
    <!-- Cell dots suggesting content -->
    <circle cx="900" cy="170" r="3" fill="#06b6d4" opacity="0.4"/>
    <circle cx="1000" cy="170" r="3" fill="#a78bfa" opacity="0.3"/>
    <circle cx="1100" cy="170" r="3" fill="#06b6d4" opacity="0.4"/>
    <circle cx="900" cy="230" r="2" fill="#a78bfa" opacity="0.25"/>
    <circle cx="1000" cy="230" r="2" fill="#7c3aed" opacity="0.25"/>
    <circle cx="1100" cy="230" r="2" fill="#a78bfa" opacity="0.25"/>
    <circle cx="900" cy="290" r="2" fill="#06b6d4" opacity="0.25"/>
    <circle cx="1000" cy="290" r="2" fill="#a78bfa" opacity="0.25"/>
    <circle cx="1100" cy="290" r="2" fill="#06b6d4" opacity="0.25"/>
    <circle cx="900" cy="350" r="2" fill="#a78bfa" opacity="0.25"/>
    <circle cx="1000" cy="350" r="2" fill="#7c3aed" opacity="0.25"/>
    <circle cx="1100" cy="350" r="2" fill="#a78bfa" opacity="0.25"/>
    <circle cx="900" cy="410" r="2" fill="#06b6d4" opacity="0.25"/>
    <circle cx="1000" cy="410" r="2" fill="#a78bfa" opacity="0.25"/>
    <circle cx="1100" cy="410" r="2" fill="#06b6d4" opacity="0.25"/>
    <circle cx="900" cy="470" r="2" fill="#a78bfa" opacity="0.25"/>
    <circle cx="1000" cy="470" r="2" fill="#7c3aed" opacity="0.25"/>
    <circle cx="1100" cy="470" r="2" fill="#a78bfa" opacity="0.25"/>
  </svg>

  <div class="content">
    <div class="series-label">kotlin-events docs</div>
    <h1>API Reference</h1>
    <p class="tagline">Complete public API — interfaces, functions, types, exceptions.</p>
  </div>

  <div class="bottom">
    <span class="domain">cristianllanos.com</span>
    <span class="lib-name">kotlin-events</span>
  </div>
  <div class="border-line"></div>
</body>
</html>
