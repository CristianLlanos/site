<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1200">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1200px; height: 630px; overflow: hidden;
    background: #08080f;
    font-family: 'DM Sans', sans-serif;
    position: relative;
  }
  .noise {
    position: absolute; inset: 0; opacity: 0.035;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    background-size: 200px;
  }
  .grid-bg {
    position: absolute; inset: 0;
    background-image:
      linear-gradient(rgba(124,58,237,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(124,58,237,0.04) 1px, transparent 1px);
    background-size: 60px 60px;
  }
  .glow { position: absolute; border-radius: 50%; filter: blur(120px); }
  .glow-1 { width: 450px; height: 450px; top: -100px; right: 50px; background: #7c3aed; opacity: 0.25; }
  .glow-2 { width: 350px; height: 350px; bottom: -80px; left: 100px; background: #059669; opacity: 0.15; }

  /* Arrow path — journey motif */
  .motif {
    position: absolute; top: 0; left: 0; width: 1200px; height: 630px; opacity: 0.45;
  }

  .content {
    position: relative; z-index: 10;
    display: flex; flex-direction: column; justify-content: center;
    height: 100%; padding: 72px 80px;
  }
  .series-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px; font-weight: 700;
    color: rgba(167,139,250,0.6);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 16px;
  }
  .step {
    display: inline-flex; align-items: center; gap: 12px;
    margin-bottom: 28px;
  }
  .step-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 18px; font-weight: 800;
    color: #08080f;
    background: linear-gradient(135deg, #a78bfa, #67e8f9);
    width: 40px; height: 40px;
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
  }
  .step-text {
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px; color: rgba(226,226,240,0.4);
    letter-spacing: 0.05em;
  }
  h1 {
    font-family: 'JetBrains Mono', monospace;
    font-size: 64px; font-weight: 800;
    line-height: 1.08;
    letter-spacing: -0.03em;
    background: linear-gradient(135deg, #f0f0f8 0%, #c4b5fd 60%, #34d399 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 20px;
  }
  .tagline {
    font-size: 22px; font-weight: 500;
    color: rgba(226,226,240,0.55);
    line-height: 1.5;
    max-width: 580px;
  }
  .bottom {
    position: absolute; bottom: 40px; left: 80px; right: 80px;
    display: flex; align-items: center; justify-content: space-between;
    z-index: 10;
  }
  .domain {
    font-family: 'JetBrains Mono', monospace;
    font-size: 15px; color: rgba(226,226,240,0.35);
  }
  .lib-name {
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px; color: rgba(167,139,250,0.45);
    border: 1px solid rgba(167,139,250,0.15);
    border-radius: 100px; padding: 5px 16px;
  }
  .border-line {
    position: absolute; bottom: 0; left: 0; right: 0; height: 4px;
    background: linear-gradient(90deg, #7c3aed, #34d399);
    opacity: 0.5;
  }
</style>
</head>
<body>
  <div class="noise"></div>
  <div class="grid-bg"></div>
  <div class="glow glow-1"></div>
  <div class="glow glow-2"></div>

  <svg class="motif" viewBox="0 0 1200 630" fill="none">
    <!-- Stepping path -->
    <path d="M 880 100 L 950 100 L 950 200 L 1020 200 L 1020 300 L 1090 300 L 1090 400 L 1020 400 L 1020 500" stroke="url(#pg)" stroke-width="2" stroke-dasharray="8 6" opacity="0.4"/>
    <circle cx="880" cy="100" r="6" fill="#34d399" opacity="0.6"/>
    <circle cx="950" cy="200" r="6" fill="#a78bfa" opacity="0.5"/>
    <circle cx="1020" cy="300" r="8" fill="#7c3aed" opacity="0.6"/>
    <circle cx="1090" cy="400" r="6" fill="#a78bfa" opacity="0.5"/>
    <circle cx="1020" cy="500" r="6" fill="#34d399" opacity="0.6"/>
    <!-- Arrow at end -->
    <polygon points="1020,510 1014,500 1026,500" fill="#34d399" opacity="0.6"/>
    <defs>
      <linearGradient id="pg" x1="0%" y1="0%" x2="0%" y2="100%">
        <stop offset="0%" stop-color="#34d399"/>
        <stop offset="50%" stop-color="#7c3aed"/>
        <stop offset="100%" stop-color="#34d399"/>
      </linearGradient>
    </defs>
  </svg>

  <div class="content">
    <div class="series-label">kotlin-container docs</div>
    <div class="step">
      <div class="step-num">01</div>
      <span class="step-text">Guide</span>
    </div>
    <h1>Getting Started</h1>
    <p class="tagline">Install and resolve your first dependency tree in under a minute.</p>
  </div>

  <div class="bottom">
    <span class="domain">cristianllanos.com</span>
    <span class="lib-name">kotlin-container</span>
  </div>
  <div class="border-line"></div>
</body>
</html>
