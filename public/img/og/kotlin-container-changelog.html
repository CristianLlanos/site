<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1200">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1200px; height: 630px; overflow: hidden;
    background: #08080f;
    font-family: 'DM Sans', sans-serif;
    position: relative;
  }
  .noise {
    position: absolute; inset: 0; opacity: 0.035;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    background-size: 200px;
  }
  .grid-bg {
    position: absolute; inset: 0;
    background-image:
      linear-gradient(rgba(124,58,237,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(124,58,237,0.04) 1px, transparent 1px);
    background-size: 60px 60px;
  }
  .glow { position: absolute; border-radius: 50%; filter: blur(120px); }
  .glow-1 { width: 400px; height: 400px; top: 0; right: 50px; background: #7c3aed; opacity: 0.18; }
  .glow-2 { width: 300px; height: 300px; bottom: -80px; left: 300px; background: #059669; opacity: 0.12; }

  .motif {
    position: absolute; top: 0; left: 0; width: 1200px; height: 630px; opacity: 0.5;
  }

  .content {
    position: relative; z-index: 10;
    display: flex; flex-direction: column; justify-content: center;
    height: 100%; padding: 72px 80px;
  }
  .series-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px; font-weight: 700;
    color: rgba(167,139,250,0.6);
    letter-spacing: 0.1em; text-transform: uppercase;
    margin-bottom: 16px;
  }
  .badge {
    display: inline-flex; align-items: center; gap: 8px;
    background: rgba(5,150,105,0.1);
    border: 1px solid rgba(5,150,105,0.2);
    border-radius: 100px; padding: 8px 18px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px; font-weight: 700; color: #34d399;
    letter-spacing: 0.05em; text-transform: uppercase;
    width: fit-content; margin-bottom: 28px;
  }
  h1 {
    font-family: 'JetBrains Mono', monospace;
    font-size: 64px; font-weight: 800;
    line-height: 1.08; letter-spacing: -0.03em;
    background: linear-gradient(135deg, #f0f0f8 0%, #c4b5fd 50%, #34d399 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 20px;
  }
  .tagline {
    font-size: 22px; font-weight: 500;
    color: rgba(226,226,240,0.55);
    line-height: 1.5; max-width: 580px;
  }
  .bottom {
    position: absolute; bottom: 40px; left: 80px; right: 80px;
    display: flex; align-items: center; justify-content: space-between; z-index: 10;
  }
  .domain {
    font-family: 'JetBrains Mono', monospace;
    font-size: 15px; color: rgba(226,226,240,0.35);
  }
  .lib-name {
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px; color: rgba(167,139,250,0.45);
    border: 1px solid rgba(167,139,250,0.15);
    border-radius: 100px; padding: 5px 16px;
  }
  .border-line {
    position: absolute; bottom: 0; left: 0; right: 0; height: 4px;
    background: linear-gradient(90deg, #7c3aed, #059669);
    opacity: 0.5;
  }
</style>
</head>
<body>
  <div class="noise"></div>
  <div class="grid-bg"></div>
  <div class="glow glow-1"></div>
  <div class="glow glow-2"></div>

  <!-- Timeline/version motif -->
  <svg class="motif" viewBox="0 0 1200 630" fill="none">
    <!-- Vertical timeline -->
    <line x1="950" y1="60" x2="950" y2="570" stroke="url(#tl)" stroke-width="2" opacity="0.25"/>

    <!-- Version nodes -->
    <circle cx="950" cy="100" r="8" fill="#34d399" opacity="0.6"/>
    <circle cx="950" cy="100" r="16" stroke="#34d399" stroke-width="1" fill="none" opacity="0.2"/>
    <text x="975" y="105" font-family="JetBrains Mono" font-size="13" fill="#34d399" opacity="0.4" font-weight="700">0.4.0</text>
    <text x="975" y="122" font-family="JetBrains Mono" font-size="10" fill="#e2e2f0" opacity="0.15">Thread safety</text>

    <circle cx="950" cy="200" r="6" fill="#a78bfa" opacity="0.5"/>
    <circle cx="950" cy="200" r="12" stroke="#a78bfa" stroke-width="1" fill="none" opacity="0.15"/>
    <text x="975" y="205" font-family="JetBrains Mono" font-size="13" fill="#a78bfa" opacity="0.35" font-weight="700">0.3.1</text>
    <text x="975" y="222" font-family="JetBrains Mono" font-size="10" fill="#e2e2f0" opacity="0.12">Circular detection</text>

    <circle cx="950" cy="300" r="6" fill="#a78bfa" opacity="0.4"/>
    <text x="975" y="305" font-family="JetBrains Mono" font-size="13" fill="#a78bfa" opacity="0.3" font-weight="700">0.3.0</text>
    <text x="975" y="322" font-family="JetBrains Mono" font-size="10" fill="#e2e2f0" opacity="0.1">Auto-resolution</text>

    <circle cx="950" cy="390" r="5" fill="#7c3aed" opacity="0.35"/>
    <text x="975" y="395" font-family="JetBrains Mono" font-size="13" fill="#7c3aed" opacity="0.25" font-weight="700">0.2.0</text>
    <text x="975" y="412" font-family="JetBrains Mono" font-size="10" fill="#e2e2f0" opacity="0.08">Scoped bindings</text>

    <circle cx="950" cy="470" r="4" fill="#6d28d9" opacity="0.3"/>
    <text x="975" y="475" font-family="JetBrains Mono" font-size="13" fill="#6d28d9" opacity="0.2" font-weight="700">0.1.0</text>
    <text x="975" y="492" font-family="JetBrains Mono" font-size="10" fill="#e2e2f0" opacity="0.06">Core container</text>

    <defs>
      <linearGradient id="tl" x1="0%" y1="0%" x2="0%" y2="100%">
        <stop offset="0%" stop-color="#34d399"/>
        <stop offset="50%" stop-color="#a78bfa"/>
        <stop offset="100%" stop-color="#6d28d9" stop-opacity="0.2"/>
      </linearGradient>
    </defs>
  </svg>

  <div class="content">
    <div class="series-label">kotlin-container docs</div>
    <div class="badge">History</div>
    <h1>Changelog</h1>
    <p class="tagline">Release history and notable changes across every version.</p>
  </div>

  <div class="bottom">
    <span class="domain">cristianllanos.com</span>
    <span class="lib-name">kotlin-container</span>
  </div>
  <div class="border-line"></div>
</body>
</html>
