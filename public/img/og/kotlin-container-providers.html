<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1200">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1200px; height: 630px; overflow: hidden;
    background: #08080f;
    font-family: 'DM Sans', sans-serif;
    position: relative;
  }
  .noise {
    position: absolute; inset: 0; opacity: 0.035;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    background-size: 200px;
  }
  .grid-bg {
    position: absolute; inset: 0;
    background-image:
      linear-gradient(rgba(124,58,237,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(124,58,237,0.04) 1px, transparent 1px);
    background-size: 60px 60px;
  }
  .glow { position: absolute; border-radius: 50%; filter: blur(120px); }
  .glow-1 { width: 400px; height: 400px; top: -50px; right: 50px; background: #7c3aed; opacity: 0.2; }
  .glow-2 { width: 300px; height: 300px; bottom: 0; left: 300px; background: #ec4899; opacity: 0.1; }

  .motif {
    position: absolute; top: 0; left: 0; width: 1200px; height: 630px; opacity: 0.5;
  }

  .content {
    position: relative; z-index: 10;
    display: flex; flex-direction: column; justify-content: center;
    height: 100%; padding: 72px 80px;
  }
  .series-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px; font-weight: 700;
    color: rgba(167,139,250,0.6);
    letter-spacing: 0.1em; text-transform: uppercase;
    margin-bottom: 16px;
  }
  .step {
    display: inline-flex; align-items: center; gap: 12px;
    margin-bottom: 28px;
  }
  .step-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 18px; font-weight: 800;
    color: #08080f;
    background: linear-gradient(135deg, #a78bfa, #f472b6);
    width: 40px; height: 40px; border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
  }
  .step-text {
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px; color: rgba(226,226,240,0.4);
    letter-spacing: 0.05em;
  }
  h1 {
    font-family: 'JetBrains Mono', monospace;
    font-size: 56px; font-weight: 800;
    line-height: 1.08; letter-spacing: -0.03em;
    background: linear-gradient(135deg, #f0f0f8 0%, #c4b5fd 50%, #f472b6 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 20px;
  }
  .tagline {
    font-size: 22px; font-weight: 500;
    color: rgba(226,226,240,0.55);
    line-height: 1.5; max-width: 580px;
  }
  .bottom {
    position: absolute; bottom: 40px; left: 80px; right: 80px;
    display: flex; align-items: center; justify-content: space-between; z-index: 10;
  }
  .domain {
    font-family: 'JetBrains Mono', monospace;
    font-size: 15px; color: rgba(226,226,240,0.35);
  }
  .lib-name {
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px; color: rgba(167,139,250,0.45);
    border: 1px solid rgba(167,139,250,0.15);
    border-radius: 100px; padding: 5px 16px;
  }
  .border-line {
    position: absolute; bottom: 0; left: 0; right: 0; height: 4px;
    background: linear-gradient(90deg, #7c3aed, #ec4899);
    opacity: 0.5;
  }
</style>
</head>
<body>
  <div class="noise"></div>
  <div class="grid-bg"></div>
  <div class="glow glow-1"></div>
  <div class="glow glow-2"></div>

  <!-- Module blocks feeding into container -->
  <svg class="motif" viewBox="0 0 1200 630" fill="none">
    <!-- Provider module 1 -->
    <rect x="850" y="90" width="130" height="90" rx="8" stroke="#f472b6" stroke-width="1.5" fill="rgba(244,114,182,0.03)" opacity="0.5"/>
    <text x="870" y="115" font-family="JetBrains Mono" font-size="10" fill="#f472b6" opacity="0.4">AuthProvider</text>
    <circle cx="880" cy="145" r="4" fill="#f472b6" opacity="0.3"/>
    <circle cx="905" cy="150" r="3" fill="#f472b6" opacity="0.25"/>
    <circle cx="935" cy="142" r="4" fill="#f472b6" opacity="0.3"/>

    <!-- Provider module 2 -->
    <rect x="1010" y="120" width="130" height="90" rx="8" stroke="#a78bfa" stroke-width="1.5" fill="rgba(167,139,250,0.03)" opacity="0.5"/>
    <text x="1025" y="145" font-family="JetBrains Mono" font-size="10" fill="#a78bfa" opacity="0.4">EventProvider</text>
    <circle cx="1040" cy="175" r="4" fill="#a78bfa" opacity="0.3"/>
    <circle cx="1070" cy="180" r="3" fill="#a78bfa" opacity="0.25"/>
    <circle cx="1100" cy="172" r="4" fill="#a78bfa" opacity="0.3"/>

    <!-- Provider module 3 -->
    <rect x="880" y="370" width="130" height="90" rx="8" stroke="#818cf8" stroke-width="1.5" fill="rgba(129,140,248,0.03)" opacity="0.5"/>
    <text x="895" y="395" font-family="JetBrains Mono" font-size="10" fill="#818cf8" opacity="0.4">CacheProvider</text>
    <circle cx="910" cy="425" r="4" fill="#818cf8" opacity="0.3"/>
    <circle cx="940" cy="430" r="3" fill="#818cf8" opacity="0.25"/>
    <circle cx="970" cy="422" r="4" fill="#818cf8" opacity="0.3"/>

    <!-- Provider module 4 -->
    <rect x="1040" y="400" width="130" height="90" rx="8" stroke="#c084fc" stroke-width="1.5" fill="rgba(192,132,252,0.03)" opacity="0.4"/>
    <text x="1055" y="425" font-family="JetBrains Mono" font-size="10" fill="#c084fc" opacity="0.35">DbProvider</text>
    <circle cx="1070" cy="455" r="4" fill="#c084fc" opacity="0.25"/>
    <circle cx="1100" cy="460" r="3" fill="#c084fc" opacity="0.2"/>
    <circle cx="1130" cy="452" r="4" fill="#c084fc" opacity="0.25"/>

    <!-- Center container node -->
    <circle cx="990" cy="280" r="18" fill="rgba(124,58,237,0.15)" stroke="#7c3aed" stroke-width="2" opacity="0.5"/>
    <circle cx="990" cy="280" r="6" fill="#7c3aed" opacity="0.6"/>

    <!-- Arrows into container -->
    <line x1="920" y1="180" x2="978" y2="268" stroke="#f472b6" stroke-width="1.5" opacity="0.25"/>
    <line x1="1060" y1="210" x2="1000" y2="268" stroke="#a78bfa" stroke-width="1.5" opacity="0.25"/>
    <line x1="945" y1="370" x2="982" y2="295" stroke="#818cf8" stroke-width="1.5" opacity="0.25"/>
    <line x1="1090" y1="400" x2="1000" y2="295" stroke="#c084fc" stroke-width="1.5" opacity="0.2"/>
  </svg>

  <div class="content">
    <div class="series-label">kotlin-container docs</div>
    <div class="step">
      <div class="step-num">04</div>
      <span class="step-text">Guide</span>
    </div>
    <h1>Service Providers</h1>
    <p class="tagline">Modular, reusable registration groups with auto-resolved parameters.</p>
  </div>

  <div class="bottom">
    <span class="domain">cristianllanos.com</span>
    <span class="lib-name">kotlin-container</span>
  </div>
  <div class="border-line"></div>
</body>
</html>
