<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1200">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1200px; height: 630px; overflow: hidden;
    background: #08080f;
    font-family: 'DM Sans', sans-serif;
    position: relative;
  }
  .noise {
    position: absolute; inset: 0; opacity: 0.035;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    background-size: 200px;
  }
  .grid-bg {
    position: absolute; inset: 0;
    background-image:
      linear-gradient(rgba(124,58,237,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(124,58,237,0.04) 1px, transparent 1px);
    background-size: 60px 60px;
  }
  .glow { position: absolute; border-radius: 50%; filter: blur(120px); }
  .glow-1 { width: 400px; height: 400px; top: 50px; right: -30px; background: #4f46e5; opacity: 0.2; }
  .glow-2 { width: 300px; height: 300px; bottom: -50px; left: 250px; background: #6366f1; opacity: 0.12; }

  .motif {
    position: absolute; top: 0; left: 0; width: 1200px; height: 630px; opacity: 0.5;
  }

  .content {
    position: relative; z-index: 10;
    display: flex; flex-direction: column; justify-content: center;
    height: 100%; padding: 72px 80px;
  }
  .series-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px; font-weight: 700;
    color: rgba(167,139,250,0.6);
    letter-spacing: 0.1em; text-transform: uppercase;
    margin-bottom: 16px;
  }
  .badge {
    display: inline-flex; align-items: center; gap: 8px;
    background: rgba(99,102,241,0.1);
    border: 1px solid rgba(99,102,241,0.2);
    border-radius: 100px; padding: 8px 18px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px; font-weight: 700; color: #818cf8;
    letter-spacing: 0.05em; text-transform: uppercase;
    width: fit-content; margin-bottom: 28px;
  }
  h1 {
    font-family: 'JetBrains Mono', monospace;
    font-size: 64px; font-weight: 800;
    line-height: 1.08; letter-spacing: -0.03em;
    background: linear-gradient(135deg, #f0f0f8 0%, #c4b5fd 50%, #818cf8 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 20px;
  }
  .tagline {
    font-size: 22px; font-weight: 500;
    color: rgba(226,226,240,0.55);
    line-height: 1.5; max-width: 580px;
  }
  .bottom {
    position: absolute; bottom: 40px; left: 80px; right: 80px;
    display: flex; align-items: center; justify-content: space-between; z-index: 10;
  }
  .domain {
    font-family: 'JetBrains Mono', monospace;
    font-size: 15px; color: rgba(226,226,240,0.35);
  }
  .lib-name {
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px; color: rgba(167,139,250,0.45);
    border: 1px solid rgba(167,139,250,0.15);
    border-radius: 100px; padding: 5px 16px;
  }
  .border-line {
    position: absolute; bottom: 0; left: 0; right: 0; height: 4px;
    background: linear-gradient(90deg, #7c3aed, #6366f1);
    opacity: 0.5;
  }
</style>
</head>
<body>
  <div class="noise"></div>
  <div class="grid-bg"></div>
  <div class="glow glow-1"></div>
  <div class="glow glow-2"></div>

  <!-- Code/documentation motif: brackets and type signatures -->
  <svg class="motif" viewBox="0 0 1200 630" fill="none">
    <!-- Large angle brackets -->
    <text x="840" y="200" font-family="JetBrains Mono" font-size="120" fill="#818cf8" opacity="0.06">&lt;</text>
    <text x="1060" y="200" font-family="JetBrains Mono" font-size="120" fill="#818cf8" opacity="0.06">&gt;</text>

    <!-- API signature lines -->
    <g font-family="JetBrains Mono" font-size="12" opacity="0.2">
      <text x="860" y="260" fill="#818cf8">fun &lt;T : Any&gt; resolve(): T</text>
      <text x="860" y="290" fill="#a78bfa">fun &lt;T : Any&gt; singleton(factory: () -&gt; T)</text>
      <text x="860" y="320" fill="#818cf8">fun &lt;T : Any&gt; factory(factory: () -&gt; T)</text>
      <text x="860" y="350" fill="#a78bfa">fun &lt;T : Any&gt; scoped(factory: () -&gt; T)</text>
      <text x="860" y="380" fill="#818cf8">fun scope(block: (Scope) -&gt; Unit)</text>
      <text x="860" y="410" fill="#a78bfa">fun &lt;R&gt; call(fn: KFunction&lt;R&gt;): R</text>
      <text x="860" y="440" fill="#818cf8">fun register(vararg providers: Any)</text>
    </g>

    <!-- Cursor blink -->
    <rect x="860" y="455" width="8" height="18" fill="#818cf8" opacity="0.15"/>
  </svg>

  <div class="content">
    <div class="series-label">kotlin-container docs</div>
    <div class="badge">Reference</div>
    <h1>API Reference</h1>
    <p class="tagline">Complete public API — interfaces, extension functions, types, and exceptions.</p>
  </div>

  <div class="bottom">
    <span class="domain">cristianllanos.com</span>
    <span class="lib-name">kotlin-container</span>
  </div>
  <div class="border-line"></div>
</body>
</html>
