<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1200">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1200px; height: 630px; overflow: hidden;
    background: #08080f;
    font-family: 'DM Sans', sans-serif;
    position: relative;
  }
  .noise {
    position: absolute; inset: 0; opacity: 0.035;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    background-size: 200px;
  }
  .grid-bg {
    position: absolute; inset: 0;
    background-image:
      linear-gradient(rgba(124,58,237,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(124,58,237,0.04) 1px, transparent 1px);
    background-size: 60px 60px;
  }
  .glow {
    position: absolute;
    border-radius: 50%;
    filter: blur(120px);
    opacity: 0.3;
  }
  .glow-1 { width: 500px; height: 500px; top: -150px; right: -100px; background: #7c3aed; }
  .glow-2 { width: 400px; height: 400px; bottom: -100px; left: -50px; background: #0891b2; opacity: 0.2; }
  .glow-3 { width: 300px; height: 300px; top: 200px; left: 400px; background: #6d28d9; opacity: 0.12; }

  /* Dependency graph SVG */
  .graph {
    position: absolute; top: 0; left: 0; width: 1200px; height: 630px;
    opacity: 0.5;
  }

  .content {
    position: relative; z-index: 10;
    display: flex; flex-direction: column; justify-content: center;
    height: 100%; padding: 72px 80px;
  }
  .badge {
    display: inline-flex; align-items: center; gap: 8px;
    background: rgba(124,58,237,0.12);
    border: 1px solid rgba(124,58,237,0.25);
    border-radius: 100px;
    padding: 8px 18px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px; font-weight: 700;
    color: #a78bfa;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    width: fit-content;
    margin-bottom: 32px;
  }
  .badge svg { flex-shrink: 0; }
  h1 {
    font-family: 'JetBrains Mono', monospace;
    font-size: 72px; font-weight: 800;
    line-height: 1.05;
    letter-spacing: -0.03em;
    background: linear-gradient(135deg, #f0f0f8 0%, #c4b5fd 50%, #67e8f9 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 20px;
    max-width: 800px;
  }
  .tagline {
    font-size: 24px; font-weight: 500;
    color: rgba(226,226,240,0.65);
    line-height: 1.5;
    max-width: 650px;
  }
  .tagline em {
    font-style: normal;
    color: rgba(167,139,250,0.9);
  }
  .bottom {
    position: absolute; bottom: 40px; left: 80px; right: 80px;
    display: flex; align-items: center; justify-content: space-between;
    z-index: 10;
  }
  .domain {
    font-family: 'JetBrains Mono', monospace;
    font-size: 15px; font-weight: 400;
    color: rgba(226,226,240,0.35);
    letter-spacing: 0.02em;
  }
  .pills {
    display: flex; gap: 10px;
  }
  .pill {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px; font-weight: 400;
    color: rgba(226,226,240,0.3);
    border: 1px solid rgba(226,226,240,0.1);
    border-radius: 100px;
    padding: 5px 14px;
  }
  .border-line {
    position: absolute; bottom: 0; left: 0; right: 0; height: 4px;
    background: linear-gradient(90deg, #7c3aed, #0891b2, #7c3aed);
    opacity: 0.6;
  }
</style>
</head>
<body>
  <div class="noise"></div>
  <div class="grid-bg"></div>
  <div class="glow glow-1"></div>
  <div class="glow glow-2"></div>
  <div class="glow glow-3"></div>

  <svg class="graph" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
    <!-- Connection lines -->
    <line x1="920" y1="120" x2="1050" y2="220" stroke="url(#lg1)" stroke-width="1.5" opacity="0.4"/>
    <line x1="920" y1="120" x2="980" y2="300" stroke="url(#lg1)" stroke-width="1.5" opacity="0.3"/>
    <line x1="1050" y1="220" x2="1100" y2="380" stroke="url(#lg1)" stroke-width="1.5" opacity="0.35"/>
    <line x1="980" y1="300" x2="1100" y2="380" stroke="url(#lg1)" stroke-width="1.5" opacity="0.25"/>
    <line x1="980" y1="300" x2="880" y2="450" stroke="url(#lg1)" stroke-width="1.5" opacity="0.3"/>
    <line x1="1100" y1="380" x2="1020" y2="520" stroke="url(#lg1)" stroke-width="1.5" opacity="0.2"/>
    <line x1="880" y1="450" x2="1020" y2="520" stroke="url(#lg1)" stroke-width="1.5" opacity="0.25"/>
    <line x1="850" y1="80" x2="920" y2="120" stroke="url(#lg1)" stroke-width="1.5" opacity="0.2"/>
    <line x1="1150" y1="140" x2="1050" y2="220" stroke="url(#lg1)" stroke-width="1.5" opacity="0.15"/>
    <!-- Nodes -->
    <circle cx="920" cy="120" r="8" fill="#7c3aed" opacity="0.7"/>
    <circle cx="920" cy="120" r="16" stroke="#7c3aed" stroke-width="1" fill="none" opacity="0.25"/>
    <circle cx="1050" cy="220" r="6" fill="#8b5cf6" opacity="0.6"/>
    <circle cx="1050" cy="220" r="12" stroke="#8b5cf6" stroke-width="1" fill="none" opacity="0.2"/>
    <circle cx="980" cy="300" r="10" fill="#6d28d9" opacity="0.65"/>
    <circle cx="980" cy="300" r="20" stroke="#6d28d9" stroke-width="1" fill="none" opacity="0.2"/>
    <circle cx="1100" cy="380" r="7" fill="#0891b2" opacity="0.6"/>
    <circle cx="1100" cy="380" r="14" stroke="#0891b2" stroke-width="1" fill="none" opacity="0.2"/>
    <circle cx="880" cy="450" r="5" fill="#06b6d4" opacity="0.5"/>
    <circle cx="880" cy="450" r="10" stroke="#06b6d4" stroke-width="1" fill="none" opacity="0.15"/>
    <circle cx="1020" cy="520" r="6" fill="#0e7490" opacity="0.4"/>
    <circle cx="850" cy="80" r="4" fill="#a78bfa" opacity="0.35"/>
    <circle cx="1150" cy="140" r="4" fill="#a78bfa" opacity="0.3"/>
    <defs>
      <linearGradient id="lg1" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#7c3aed"/>
        <stop offset="100%" stop-color="#0891b2"/>
      </linearGradient>
    </defs>
  </svg>

  <div class="content">
    <div class="badge">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><rect x="2" y="2" width="12" height="12" rx="2" stroke="#a78bfa" stroke-width="1.5"/><path d="M6 5l4 3-4 3" stroke="#a78bfa" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      Kotlin Library
    </div>
    <h1>kotlin-container</h1>
    <p class="tagline">
      Lightweight dependency injection for Kotlin.<br>
      <em>Auto-resolution, scoped lifecycles, thread safety</em> — zero config.
    </p>
  </div>

  <div class="bottom">
    <span class="domain">cristianllanos.com</span>
    <div class="pills">
      <span class="pill">Maven Central</span>
      <span class="pill">MIT License</span>
    </div>
  </div>
  <div class="border-line"></div>
</body>
</html>
