<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1200">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1200px; height: 630px; overflow: hidden;
    background: #08080f;
    font-family: 'DM Sans', sans-serif;
    position: relative;
  }
  .noise {
    position: absolute; inset: 0; opacity: 0.035;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    background-size: 200px;
  }
  .grid-bg {
    position: absolute; inset: 0;
    background-image:
      linear-gradient(rgba(124,58,237,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(124,58,237,0.04) 1px, transparent 1px);
    background-size: 60px 60px;
  }
  .glow { position: absolute; border-radius: 50%; filter: blur(120px); }
  .glow-1 { width: 450px; height: 450px; top: -80px; right: -50px; background: #dc2626; opacity: 0.12; }
  .glow-2 { width: 400px; height: 400px; bottom: -100px; left: 200px; background: #7c3aed; opacity: 0.18; }

  .motif {
    position: absolute; top: 0; left: 0; width: 1200px; height: 630px; opacity: 0.5;
  }

  .content {
    position: relative; z-index: 10;
    display: flex; flex-direction: column; justify-content: center;
    height: 100%; padding: 72px 80px;
  }
  .series-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px; font-weight: 700;
    color: rgba(167,139,250,0.6);
    letter-spacing: 0.1em; text-transform: uppercase;
    margin-bottom: 16px;
  }
  .step {
    display: inline-flex; align-items: center; gap: 12px;
    margin-bottom: 28px;
  }
  .step-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 18px; font-weight: 800;
    color: #08080f;
    background: linear-gradient(135deg, #a78bfa, #f87171);
    width: 40px; height: 40px; border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
  }
  .step-text {
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px; color: rgba(226,226,240,0.4);
    letter-spacing: 0.05em;
  }
  h1 {
    font-family: 'JetBrains Mono', monospace;
    font-size: 64px; font-weight: 800;
    line-height: 1.08; letter-spacing: -0.03em;
    background: linear-gradient(135deg, #f0f0f8 0%, #c4b5fd 50%, #f87171 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 20px;
  }
  .tagline {
    font-size: 22px; font-weight: 500;
    color: rgba(226,226,240,0.55);
    line-height: 1.5; max-width: 580px;
  }
  .bottom {
    position: absolute; bottom: 40px; left: 80px; right: 80px;
    display: flex; align-items: center; justify-content: space-between; z-index: 10;
  }
  .domain {
    font-family: 'JetBrains Mono', monospace;
    font-size: 15px; color: rgba(226,226,240,0.35);
  }
  .lib-name {
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px; color: rgba(167,139,250,0.45);
    border: 1px solid rgba(167,139,250,0.15);
    border-radius: 100px; padding: 5px 16px;
  }
  .border-line {
    position: absolute; bottom: 0; left: 0; right: 0; height: 4px;
    background: linear-gradient(90deg, #7c3aed, #dc2626);
    opacity: 0.5;
  }
</style>
</head>
<body>
  <div class="noise"></div>
  <div class="grid-bg"></div>
  <div class="glow glow-1"></div>
  <div class="glow glow-2"></div>

  <!-- Thread-safe: interlocking concurrent paths -->
  <svg class="motif" viewBox="0 0 1200 630" fill="none">
    <!-- Thread 1 -->
    <path d="M 850 80 C 900 180, 950 180, 950 280 C 950 380, 1000 380, 1000 480" stroke="#f87171" stroke-width="1.5" opacity="0.3" fill="none"/>
    <!-- Thread 2 -->
    <path d="M 950 80 C 1000 180, 1050 180, 1050 280 C 1050 380, 1100 380, 1100 480" stroke="#a78bfa" stroke-width="1.5" opacity="0.3" fill="none"/>
    <!-- Thread 3 -->
    <path d="M 1100 80 C 1050 180, 950 200, 980 280 C 1010 360, 1000 400, 950 500" stroke="#f472b6" stroke-width="1.5" opacity="0.25" fill="none"/>

    <!-- Lock point where threads converge -->
    <circle cx="990" cy="280" r="20" stroke="#f87171" stroke-width="2" fill="rgba(248,113,113,0.05)" opacity="0.4"/>
    <rect x="982" y="270" width="16" height="20" rx="3" stroke="#f87171" stroke-width="1.5" fill="none" opacity="0.5"/>
    <path d="M985 270 V264 a5 5 0 0 1 10 0 V270" stroke="#f87171" stroke-width="1.5" fill="none" opacity="0.5"/>

    <!-- Thread nodes -->
    <circle cx="850" cy="80" r="5" fill="#f87171" opacity="0.5"/>
    <circle cx="950" cy="80" r="5" fill="#a78bfa" opacity="0.5"/>
    <circle cx="1100" cy="80" r="5" fill="#f472b6" opacity="0.4"/>
    <text x="832" y="72" font-family="JetBrains Mono" font-size="10" fill="#f87171" opacity="0.3">T1</text>
    <text x="935" y="72" font-family="JetBrains Mono" font-size="10" fill="#a78bfa" opacity="0.3">T2</text>
    <text x="1085" y="72" font-family="JetBrains Mono" font-size="10" fill="#f472b6" opacity="0.25">T3</text>

    <!-- Interface segregation: split boxes at bottom right -->
    <rect x="1060" y="520" width="60" height="28" rx="4" stroke="#a78bfa" stroke-width="1" fill="none" opacity="0.15"/>
    <text x="1068" y="539" font-family="JetBrains Mono" font-size="9" fill="#a78bfa" opacity="0.2">Resolver</text>
    <rect x="990" y="520" width="64" height="28" rx="4" stroke="#f87171" stroke-width="1" fill="none" opacity="0.15"/>
    <text x="995" y="539" font-family="JetBrains Mono" font-size="9" fill="#f87171" opacity="0.2">Registrar</text>
    <rect x="920" y="520" width="64" height="28" rx="4" stroke="#f472b6" stroke-width="1" fill="none" opacity="0.12"/>
    <text x="932" y="539" font-family="JetBrains Mono" font-size="9" fill="#f472b6" opacity="0.18">Caller</text>
  </svg>

  <div class="content">
    <div class="series-label">kotlin-container docs</div>
    <div class="step">
      <div class="step-num">05</div>
      <span class="step-text">Guide</span>
    </div>
    <h1>Advanced</h1>
    <p class="tagline">Thread safety, callable injection, custom resolvers, and interface segregation.</p>
  </div>

  <div class="bottom">
    <span class="domain">cristianllanos.com</span>
    <span class="lib-name">kotlin-container</span>
  </div>
  <div class="border-line"></div>
</body>
</html>
