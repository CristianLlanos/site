<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1200">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1200px; height: 630px; overflow: hidden; position: relative;
    background: #08080f; font-family: 'DM Sans', sans-serif;
  }
  .noise {
    position: absolute; inset: 0; opacity: 0.035;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    background-size: 200px;
  }
  .grid-bg {
    position: absolute; inset: 0;
    background-image:
      linear-gradient(rgba(124,58,237,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(124,58,237,0.04) 1px, transparent 1px);
    background-size: 60px 60px;
  }
  .glow { position: absolute; border-radius: 50%; filter: blur(120px); }
  .glow-1 { width: 480px; height: 480px; top: -120px; right: -80px; background: #7c3aed; opacity: 0.20; }
  .glow-2 { width: 400px; height: 400px; bottom: -160px; left: -120px; background: #0891b2; opacity: 0.14; }
  .motif { position: absolute; inset: 0; }
  .content {
    position: relative; z-index: 10;
    display: flex; flex-direction: column; justify-content: center;
    height: 100%; padding: 72px 80px;
  }
  .badge {
    display: inline-flex; align-items: center; gap: 8px;
    background: rgba(124,58,237,0.12); border: 1px solid rgba(124,58,237,0.25);
    border-radius: 100px; padding: 8px 18px;
    font-family: 'JetBrains Mono', monospace; font-size: 14px; font-weight: 700;
    color: #a78bfa; letter-spacing: 0.05em; text-transform: uppercase;
    width: fit-content; margin-bottom: 28px;
  }
  h1 {
    font-family: 'JetBrains Mono', monospace; font-size: 54px; font-weight: 800;
    line-height: 1.08; letter-spacing: -0.03em; max-width: 660px;
    background: linear-gradient(135deg, #f0f0f8 0%, #a78bfa 50%, #22d3ee 100%);
    -webkit-background-clip: text; background-clip: text; color: transparent;
  }
  .tagline {
    margin-top: 24px; font-size: 23px; font-weight: 500; line-height: 1.4;
    color: rgba(226,226,240,0.6); max-width: 560px;
  }
  .tagline code {
    font-family: 'JetBrains Mono', monospace; font-size: 20px; color: #a78bfa;
  }
  .bottom {
    position: absolute; bottom: 40px; left: 80px; right: 80px;
    display: flex; align-items: center; justify-content: space-between; z-index: 10;
  }
  .domain {
    font-family: 'JetBrains Mono', monospace; font-size: 15px; font-weight: 400;
    color: rgba(226,226,240,0.35);
  }
  .pills { display: flex; gap: 10px; }
  .pill {
    font-family: 'JetBrains Mono', monospace; font-size: 12px; font-weight: 400;
    color: rgba(226,226,240,0.3); border: 1px solid rgba(226,226,240,0.1);
    border-radius: 100px; padding: 5px 14px;
  }
  .border-line {
    position: absolute; bottom: 0; left: 0; right: 0; height: 4px;
    background: linear-gradient(90deg, #7c3aed, #0891b2, #7c3aed); opacity: 0.5;
  }
</style>
</head>
<body>
  <div class="noise"></div>
  <div class="grid-bg"></div>
  <div class="glow glow-1"></div>
  <div class="glow glow-2"></div>

  <svg class="motif" viewBox="0 0 1200 630" fill="none">
    <defs>
      <linearGradient id="ln" x1="856" y1="224" x2="1088" y2="524" gradientUnits="userSpaceOnUse">
        <stop offset="0" stop-color="#7c3aed"/>
        <stop offset="1" stop-color="#22d3ee"/>
      </linearGradient>
    </defs>
    <!-- stacked spec docs -->
    <rect x="912" y="168" width="232" height="300" rx="16" stroke="rgba(226,226,240,0.10)" stroke-width="1.5"/>
    <rect x="884" y="196" width="232" height="300" rx="16" stroke="rgba(226,226,240,0.16)" stroke-width="1.5"/>
    <rect x="856" y="224" width="232" height="300" rx="16" stroke="url(#ln)" stroke-width="2" opacity="0.7"/>
    <!-- lines inside front doc -->
    <rect x="888" y="262" width="120" height="11" rx="5.5" fill="#a78bfa" opacity="0.55"/>
    <rect x="888" y="292" width="172" height="7" rx="3.5" fill="rgba(226,226,240,0.22)"/>
    <rect x="888" y="312" width="146" height="7" rx="3.5" fill="rgba(226,226,240,0.22)"/>
    <rect x="888" y="344" width="92" height="11" rx="5.5" fill="#22d3ee" opacity="0.55"/>
    <rect x="888" y="374" width="172" height="7" rx="3.5" fill="rgba(226,226,240,0.18)"/>
    <rect x="888" y="394" width="132" height="7" rx="3.5" fill="rgba(226,226,240,0.18)"/>
    <!-- check -->
    <circle cx="1058" cy="488" r="21" fill="none" stroke="url(#ln)" stroke-width="2" opacity="0.7"/>
    <path d="M1048,488 l7,7 l13,-14" stroke="#22d3ee" stroke-width="2.6" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </svg>

  <div class="content">
    <div class="badge">Blog · /spec</div>
    <h1>Diseñar con IA antes de escribir código</h1>
    <p class="tagline">El método <code>/spec</code>: diseña proyectos, features y refactors —y deja las decisiones por escrito— antes de codear.</p>
  </div>

  <div class="bottom">
    <span class="domain">cristianllanos.com</span>
    <div class="pills">
      <span class="pill">IA</span>
      <span class="pill">spec-driven</span>
      <span class="pill">diseño de software</span>
    </div>
  </div>
  <div class="border-line"></div>
</body>
</html>
