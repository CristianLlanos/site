<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1200">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1200px; height: 630px; overflow: hidden;
    background: #08080f;
    font-family: 'DM Sans', sans-serif;
    position: relative;
  }
  .noise {
    position: absolute; inset: 0; opacity: 0.035;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    background-size: 200px;
  }
  .grid-bg {
    position: absolute; inset: 0;
    background-image:
      linear-gradient(rgba(124,58,237,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(124,58,237,0.04) 1px, transparent 1px);
    background-size: 60px 60px;
  }
  .glow {
    position: absolute;
    border-radius: 50%;
    filter: blur(120px);
  }
  .glow-1 { width: 500px; height: 500px; top: -150px; right: -100px; background: #7c3aed; opacity: 0.25; }
  .glow-2 { width: 400px; height: 400px; bottom: -100px; left: -50px; background: #0891b2; opacity: 0.18; }
  .glow-3 { width: 350px; height: 350px; top: 150px; left: 500px; background: #6d28d9; opacity: 0.1; }

  /* Network graph — personal connections motif */
  .graph {
    position: absolute; top: 0; left: 0; width: 1200px; height: 630px;
    opacity: 0.5;
  }

  .content {
    position: relative; z-index: 10;
    display: flex; flex-direction: column; justify-content: center;
    height: 100%; padding: 72px 80px;
  }
  .badge {
    display: inline-flex; align-items: center; gap: 8px;
    background: rgba(124,58,237,0.12);
    border: 1px solid rgba(124,58,237,0.25);
    border-radius: 100px;
    padding: 8px 18px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px; font-weight: 700;
    color: #a78bfa;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    width: fit-content;
    margin-bottom: 32px;
  }
  h1 {
    font-family: 'JetBrains Mono', monospace;
    font-size: 72px; font-weight: 800;
    line-height: 1.05;
    letter-spacing: -0.03em;
    background: linear-gradient(135deg, #f0f0f8 0%, #c4b5fd 50%, #67e8f9 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 24px;
    max-width: 800px;
  }
  .tagline {
    font-size: 24px; font-weight: 500;
    color: rgba(226,226,240,0.6);
    line-height: 1.5;
    max-width: 650px;
  }
  .tagline em {
    font-style: italic;
    color: rgba(167,139,250,0.85);
  }
  .bottom {
    position: absolute; bottom: 40px; left: 80px; right: 80px;
    display: flex; align-items: center; justify-content: space-between;
    z-index: 10;
  }
  .domain {
    font-family: 'JetBrains Mono', monospace;
    font-size: 15px; font-weight: 400;
    color: rgba(226,226,240,0.35);
    letter-spacing: 0.02em;
  }
  .pills {
    display: flex; gap: 10px;
  }
  .pill {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px; font-weight: 400;
    color: rgba(226,226,240,0.3);
    border: 1px solid rgba(226,226,240,0.1);
    border-radius: 100px;
    padding: 5px 14px;
  }
  .border-line {
    position: absolute; bottom: 0; left: 0; right: 0; height: 4px;
    background: linear-gradient(90deg, #7c3aed, #0891b2, #7c3aed);
    opacity: 0.6;
  }
</style>
</head>
<body>
  <div class="noise"></div>
  <div class="grid-bg"></div>
  <div class="glow glow-1"></div>
  <div class="glow glow-2"></div>
  <div class="glow glow-3"></div>

  <svg class="graph" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
    <!-- Network of connected nodes — representing projects, skills, community -->
    <line x1="880" y1="90" x2="1000" y2="160" stroke="url(#lg1)" stroke-width="1.5" opacity="0.35"/>
    <line x1="1000" y1="160" x2="1080" y2="280" stroke="url(#lg1)" stroke-width="1.5" opacity="0.3"/>
    <line x1="1000" y1="160" x2="920" y2="280" stroke="url(#lg1)" stroke-width="1.5" opacity="0.25"/>
    <line x1="920" y1="280" x2="1080" y2="280" stroke="url(#lg1)" stroke-width="1.5" opacity="0.2"/>
    <line x1="1080" y1="280" x2="1140" y2="420" stroke="url(#lg1)" stroke-width="1.5" opacity="0.3"/>
    <line x1="920" y1="280" x2="860" y2="420" stroke="url(#lg1)" stroke-width="1.5" opacity="0.25"/>
    <line x1="860" y1="420" x2="980" y2="500" stroke="url(#lg1)" stroke-width="1.5" opacity="0.2"/>
    <line x1="1140" y1="420" x2="980" y2="500" stroke="url(#lg1)" stroke-width="1.5" opacity="0.2"/>
    <line x1="800" y1="150" x2="880" y2="90" stroke="url(#lg1)" stroke-width="1.5" opacity="0.15"/>
    <line x1="1150" y1="120" x2="1000" y2="160" stroke="url(#lg1)" stroke-width="1.5" opacity="0.15"/>
    <line x1="780" y1="350" x2="860" y2="420" stroke="url(#lg1)" stroke-width="1.5" opacity="0.12"/>
    <line x1="1080" y1="280" x2="1170" y2="200" stroke="url(#lg1)" stroke-width="1.5" opacity="0.12"/>

    <!-- Primary nodes -->
    <circle cx="1000" cy="160" r="10" fill="#7c3aed" opacity="0.7"/>
    <circle cx="1000" cy="160" r="20" stroke="#7c3aed" stroke-width="1" fill="none" opacity="0.25"/>
    <circle cx="920" cy="280" r="8" fill="#8b5cf6" opacity="0.6"/>
    <circle cx="920" cy="280" r="16" stroke="#8b5cf6" stroke-width="1" fill="none" opacity="0.2"/>
    <circle cx="1080" cy="280" r="8" fill="#6d28d9" opacity="0.6"/>
    <circle cx="1080" cy="280" r="16" stroke="#6d28d9" stroke-width="1" fill="none" opacity="0.2"/>
    <circle cx="860" cy="420" r="6" fill="#0891b2" opacity="0.55"/>
    <circle cx="860" cy="420" r="12" stroke="#0891b2" stroke-width="1" fill="none" opacity="0.2"/>
    <circle cx="1140" cy="420" r="6" fill="#06b6d4" opacity="0.5"/>
    <circle cx="1140" cy="420" r="12" stroke="#06b6d4" stroke-width="1" fill="none" opacity="0.15"/>
    <circle cx="980" cy="500" r="7" fill="#0e7490" opacity="0.45"/>
    <circle cx="980" cy="500" r="14" stroke="#0e7490" stroke-width="1" fill="none" opacity="0.15"/>

    <!-- Peripheral nodes -->
    <circle cx="880" cy="90" r="5" fill="#a78bfa" opacity="0.4"/>
    <circle cx="800" cy="150" r="4" fill="#a78bfa" opacity="0.3"/>
    <circle cx="1150" cy="120" r="4" fill="#a78bfa" opacity="0.3"/>
    <circle cx="780" cy="350" r="3" fill="#06b6d4" opacity="0.25"/>
    <circle cx="1170" cy="200" r="3" fill="#8b5cf6" opacity="0.25"/>

    <defs>
      <linearGradient id="lg1" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#7c3aed"/>
        <stop offset="100%" stop-color="#0891b2"/>
      </linearGradient>
    </defs>
  </svg>

  <div class="content">
    <div class="badge">
      Engineering Lead &middot; Open Source &middot; Educator
    </div>
    <h1>Cristian Llanos</h1>
    <p class="tagline">
      <em>Creemos software escalable, seguro y mantenible juntos.</em><br>
      &iquest;Qu&eacute; aprenderemos hoy?
    </p>
  </div>

  <div class="bottom">
    <span class="domain">cristianllanos.com</span>
    <div class="pills">
      <span class="pill">Kotlin</span>
      <span class="pill">TypeScript</span>
      <span class="pill">PHP</span>
      <span class="pill">AWS</span>
    </div>
  </div>
  <div class="border-line"></div>
</body>
</html>
