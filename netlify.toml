[build]
  command = "npm run build"
  publish = "out"

[build.environment]
  NEXT_PUBLIC_URL = "https://cristianllanos.com"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/img/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Content-Type = "application/xml"

[[headers]]
  for = "/feed.xml"
  [headers.values]
    Content-Type = "application/rss+xml"

[[redirects]]
  from = "/blog/2021-03-24-single-responsibility-principle/"
  to = "/blog/single-responsibility-principle/"
  status = 301

[[redirects]]
  # `ó` must be percent-encoded so Netlify matches the incoming %C3%B3 request
  from = "/blog/2021-04-23-c%C3%B3mo-generar-modelos-de-laravel-desde-una-base-de-datos-existente/"
  to = "/blog/como-generar-modelos-de-laravel-desde-una-base-de-datos-existente/"
  status = 301
